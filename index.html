<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Luis</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
    --bg: #0d1117;
    --card: #161b22;
    --accent: #2563eb;
    --text: #e6edf3;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #010409;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    color: var(--accent);
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* HEADER */
.topbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--card);
    color: white;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 15px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    background: #1f2937;
}

.card img {
    width: 40px;
    height: 40px;
    margin-bottom: 10px;
}

.tag {
    background: var(--accent);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    display: inline-block;
    margin-top: 5px;
}

/* ADD BUTTON */
.add-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 30px;
    border: none;
    color: white;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    width: 300px;
}

.modal-content input {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
}

/* MOBILE */
@media(max-width: 768px) {
    .sidebar {
        display: none;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Dashboard</h2>
</div>

<div class="main">

<div class="topbar">
    <input type="text" id="search" placeholder="Buscar...">
    <select id="filter">
        <option value="">Todas</option>
    </select>
</div>

<div class="grid" id="links"></div>

</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal" id="modal">
<div class="modal-content">
    <input id="titulo" placeholder="Título">
    <input id="url" placeholder="URL">
    <input id="categoria" placeholder="Categoría">
    <button onclick="guardar()">Guardar</button>
</div>
</div>

<script>

// 🔗 SUPABASE
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://fburktlykhajzzvpnfcg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidXJrdGx5a2hhanp6dnBuZmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDg3NDEsImV4cCI6MjA5MjYyNDc0MX0.J1O0IjfC233ezx9jb55xnINm4i9qtX6obnFvCvoyDk4"
);

let data = [];

// 🌐 ICONO AUTOMÁTICO
function getFavicon(url) {
    return "https://www.google.com/s2/favicons?sz=64&domain=" + url;
}

// 🚀 CARGAR
async function cargar() {
    const { data: links, error } = await supabaseClient.from('links').select('*');

    if (error) {
        console.error("Error al cargar:", error);
        return;
    }

    data = links || [];
    render();
    categorias();
}

// 🎨 RENDER
function render() {
    const cont = document.getElementById("links");
    cont.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    data
    .filter(i => 
        i.titulo.toLowerCase().includes(search) &&
        (!filter || i.categoria === filter)
    )
    .forEach(i => {

        let url = i.url.startsWith("http") ? i.url : "https://" + i.url;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${getFavicon(url)}">
            <div>${i.titulo}</div>
            <div class="tag">${i.categoria}</div>
        `;

        div.onclick = () => window.open(url, "_blank");

        cont.appendChild(div);
    });
}

// 🏷️ CATEGORÍAS
function categorias() {
    const select = document.getElementById("filter");
    const cats = [...new Set(data.map(i => i.categoria))];

    select.innerHTML = '<option value="">Todas</option>';
    cats.forEach(c => {
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });
}

// ➕ MODAL
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

// 💾 GUARDAR
async function guardar() {
    const tituloInput = document.getElementById("titulo").value.trim();
    const urlInput = document.getElementById("url").value.trim();
    const categoriaInput = document.getElementById("categoria").value.trim();

    if (!tituloInput || !urlInput || !categoriaInput) {
        alert("Completa todos los campos");
        return;
    }

    const { error } = await supabaseClient
        .from('links')
        .insert([{
            titulo: tituloInput,
            url: urlInput,
            categoria: categoriaInput
        }]);

    if (error) {
        console.error("Error al guardar:", error);
        alert("Error al guardar");
        return;
    }

    document.getElementById("modal").style.display = "none";

    document.getElementById("titulo").value = "";
    document.getElementById("url").value = "";
    document.getElementById("categoria").value = "";

    cargar();
}

// 🔍 EVENTOS
document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

// 🚀 INIT
cargar();

</script>

</body>
</html>
