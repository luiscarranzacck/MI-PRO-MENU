<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Luis</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d1117;
    color: white;
}

header {
    padding: 15px;
    background: #161b22;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.controls {
    display: flex;
    gap: 10px;
    padding: 10px;
}

input, select {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: .2s;
}

.card:hover {
    background: #2563eb;
}

.add-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #2563eb;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 30px;
    border: none;
    color: white;
    cursor: pointer;
}

/* modal */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}

.modal-content input {
    width: 100%;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<header>Dashboard Luis</header>

<div class="controls">
    <input type="text" id="search" placeholder="Buscar...">
    <select id="filter">
        <option value="">Todas</option>
    </select>
</div>

<div class="container" id="links"></div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <input id="titulo" placeholder="Título">
        <input id="url" placeholder="URL">
        <input id="categoria" placeholder="Categoría">
        <button onclick="guardar()">Guardar</button>
    </div>
</div>

<script>

const supabase = supabase.createClient(
    "TU_URL_AQUI",
    "TU_KEY_AQUI"
);

let data = [];

async function cargar() {
    const { data: links } = await supabase.from('links').select('*');
    data = links;
    render();
    cargarCategorias();
}

function render() {
    const container = document.getElementById("links");
    container.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    data
    .filter(i => 
        i.titulo.toLowerCase().includes(search) &&
        (filter === "" || i.categoria === filter)
    )
    .forEach(i => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = i.titulo;
        div.onclick = () => window.open(i.url, "_blank");
        container.appendChild(div);
    });
}

function cargarCategorias() {
    const select = document.getElementById("filter");
    const categorias = [...new Set(data.map(i => i.categoria))];

    select.innerHTML = '<option value="">Todas</option>';
    categorias.forEach(c => {
        const op = document.createElement("option");
        op.value = c;
        op.innerText = c;
        select.appendChild(op);
    });
}

function openModal() {
    document.getElementById("modal").style.display = "flex";
}

async function guardar() {
    const titulo = document.getElementById("titulo").value;
    const url = document.getElementById("url").value;
    const categoria = document.getElementById("categoria").value;

    await supabase.from('links').insert([{ titulo, url, categoria }]);

    document.getElementById("modal").style.display = "none";
    cargar();
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

cargar();

</script>

</body>
</html>
