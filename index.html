<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Luis</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--bg:#020617;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.12);

--c1:#4424d3;
--c2:#6943de;
--c3:#8f62e9;
--c4:#b481f4;
--c5:#daa0ff;

--text:#e2e8f0;
}

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#020617,#0f172a);
color:var(--text);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:230px;
height:100vh;
padding:20px;
background:rgba(20,10,60,0.4);
backdrop-filter:blur(20px);
border-right:1px solid var(--border);
}

.sidebar h2{
margin:0;
background:linear-gradient(90deg,var(--c3),var(--c5));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.author{
font-size:13px;
font-weight:bold;
color:white;
margin-top:5px;
}

/* MENU */
.menu{margin-top:30px;}

.menu-item{
padding:10px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.menu-item:hover{
background:linear-gradient(135deg,var(--c2),var(--c4));
}

/* MAIN */
.main{flex:1;padding:20px;}

.topbar{
display:flex;
gap:10px;
margin-bottom:20px;
}

input,select{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,0.05);
color:white;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

/* CARD */
.card{
position:relative;
padding:15px;
border-radius:18px;
background:rgba(70,40,200,0.15);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.15);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
background:rgba(140,90,255,0.25);
box-shadow:0 10px 30px rgba(150,100,255,0.4);
}

.card img{
width:40px;
margin-bottom:10px;
}

/* TAG */
.tag{
background:linear-gradient(135deg,var(--c3),var(--c5));
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

/* MENU 3 DOTS */
.more{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
}

.dropdown{
position:absolute;
top:30px;
right:10px;
background:rgba(20,10,60,0.9);
backdrop-filter:blur(15px);
border-radius:10px;
display:none;
}

.dropdown div{
padding:10px;
cursor:pointer;
}

.dropdown div:hover{
background:linear-gradient(135deg,var(--c2),var(--c4));
}

/* BOTON + */
.add-btn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:30px;
color:white;
cursor:pointer;
background:linear-gradient(135deg,var(--c2),var(--c5));
box-shadow:0 10px 40px rgba(150,100,255,0.6);
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
justify-content:center;
align-items:center;
}

/* MODAL BOX */
.modal-content{
position:relative;
width:320px;
padding:25px;
border-radius:18px;
background:linear-gradient(145deg,rgba(80,40,200,0.6),rgba(30,10,80,0.8));
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 20px 50px rgba(120,80,255,0.5);
}

/* CLOSE */
.close{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
color:#aaa;
}
.close:hover{color:white;}

/* INPUT */
.modal-content input{
width:100%;
margin-bottom:12px;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
color:white;
}

/* BUTTON */
.modal-content button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,var(--c2),var(--c5));
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.modal-content button:hover{
transform:scale(1.05);
}

/* RESPONSIVE */
@media(max-width:768px){
.sidebar{display:none;}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<div class="author">by: Luis Carranza</div>

<div class="menu">
<div class="menu-item" onclick="cargar()">🏠 Inicio</div>
</div>
</div>

<div class="main">
<h2>Mis enlaces</h2>

<div class="topbar">
<input id="search" placeholder="Buscar...">
<select id="filter"><option value="">Todas</option></select>
</div>

<div class="grid" id="links"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal" id="modal" onclick="cerrarModal(event)">
<div class="modal-content" onclick="event.stopPropagation()">

<div class="close" onclick="closeModal()">✖</div>

<input id="titulo" placeholder="Título">
<input id="url" placeholder="URL">
<input id="categoria" placeholder="Categoría">

<button onclick="guardar()">Guardar</button>

</div>
</div>

<script>
window.addEventListener("DOMContentLoaded",()=>{

const supabaseClient = supabase.createClient(
"https://fburktlykhajzzvpnfcg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidXJrdGx5a2hhanp6dnBuZmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDg3NDEsImV4cCI6MjA5MjYyNDc0MX0.J1O0IjfCvoyDk4"
);

let data=[];
let editId=null;

function getFavicon(url){
return "https://www.google.com/s2/favicons?sz=64&domain="+url;
}

async function cargar(){
const {data:links}=await supabaseClient.from('links').select('*');
data=links||[];
render();
categorias();
}

function render(){
const cont=document.getElementById("links");
cont.innerHTML="";

data.forEach(i=>{
let url=i.url.startsWith("http")?i.url:"https://"+i.url;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="more">⋮</div>
<div class="dropdown">
<div onclick="editar(${i.id})">✏️ Editar</div>
<div onclick="eliminar(${i.id})">🗑 Eliminar</div>
</div>
<img src="${getFavicon(url)}">
<div>${i.titulo}</div>
<div class="tag">${i.categoria}</div>
`;

div.onclick=()=>window.open(url,"_blank");

const more=div.querySelector(".more");
const dropdown=div.querySelector(".dropdown");

more.onclick=(e)=>{
e.stopPropagation();
dropdown.style.display=dropdown.style.display==="block"?"none":"block";
};

cont.appendChild(div);
});
}

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function cerrarModal(e){
if(e.target.id==="modal") closeModal();
}

async function eliminar(id){
if(!confirm("¿Eliminar enlace?"))return;
await supabaseClient.from('links').delete().eq('id',id);
cargar();
}

function editar(id){
const item=data.find(x=>x.id===id);
document.getElementById("titulo").value=item.titulo;
document.getElementById("url").value=item.url;
document.getElementById("categoria").value=item.categoria;
editId=id;
openModal();
}

async function guardar(){
const titulo=document.getElementById("titulo").value.trim();
const url=document.getElementById("url").value.trim();
const categoria=document.getElementById("categoria").value.trim();

if(!titulo||!url||!categoria){alert("Completa todo");return;}

if(editId){
await supabaseClient.from('links').update({titulo,url,categoria}).eq('id',editId);
editId=null;
}else{
await supabaseClient.from('links').insert([{titulo,url,categoria}]);
}

closeModal();

document.getElementById("titulo").value="";
document.getElementById("url").value="";
document.getElementById("categoria").value="";

cargar();
}

function categorias(){
const select=document.getElementById("filter");
const cats=[...new Set(data.map(i=>i.categoria))];
select.innerHTML='<option value="">Todas</option>';
cats.forEach(c=>select.innerHTML+=`<option>${c}</option>`);
}

window.openModal=openModal;
window.closeModal=closeModal;
window.cargar=cargar;
window.editar=editar;
window.eliminar=eliminar;
window.guardar=guardar;

cargar();

});
</script>

</body>
</html>
