<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Panel</title>
<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
}
h1 {
    margin-top: 20px;
}
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}
a {
    text-decoration: none;
    background: #1f1f1f;
    padding: 20px;
    border-radius: 10px;
    color: white;
    font-size: 18px;
    transition: 0.3s;
}
a:hover {
    background: #333;
}
</style>
</head>
<body>

<h1>🚀 Mis Accesos</h1>

<div class="container">
    <a href="https://mail.google.com" target="_blank">📧 Correo</a>
    <a href="https://drive.google.com" target="_blank">📁 Drive</a>
    <a href="https://chat.openai.com" target="_blank">🤖 ChatGPT</a>
    <a href="https://calendar.google.com" target="_blank">📅 Calendario</a>
</div>

</body>
</html>
