<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Luis</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg:#0d1117;
    --card:#161b22;
    --accent:#2563eb;
    --accent-light:#3b82f6;
    --text:#e6edf3;
}

body{margin:0;font-family:'Segoe UI';background:var(--bg);color:var(--text);display:flex;}

/* SIDEBAR */
.sidebar{width:220px;background:#010409;height:100vh;padding:20px;}
.sidebar h2{color:var(--accent);margin:0;}
.author{color:white;font-weight:bold;font-size:13px;margin-top:5px;}

.menu{margin-top:30px;}
.menu-item{padding:10px;border-radius:8px;cursor:pointer;}
.menu-item:hover{background:var(--accent);}

/* MAIN */
.main{flex:1;padding:20px;}
.title{margin-bottom:15px;}

.topbar{display:flex;gap:10px;margin-bottom:20px;}
input,select{padding:10px;border-radius:10px;border:none;background:var(--card);color:white;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;}

.card{position:relative;background:var(--card);border-radius:16px;padding:15px;cursor:pointer;}
.card:hover{background:#1f2937;}
.card img{width:40px;margin-bottom:10px;}

.tag{background:var(--accent);padding:3px 6px;border-radius:5px;font-size:12px;}

.more{position:absolute;top:10px;right:10px;cursor:pointer;font-size:18px;}

.dropdown{
    position:absolute;
    top:30px;
    right:10px;
    background:#1f2937;
    border-radius:8px;
    display:none;
    flex-direction:column;
}
.dropdown div{padding:8px 12px;cursor:pointer;}
.dropdown div:hover{background:var(--accent);}

/* BOTON + */
.add-btn{
position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;
background:linear-gradient(135deg,var(--accent),var(--accent-light));
color:white;font-size:30px;border:none;cursor:pointer;
box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

/* MODAL MEJORADO */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
backdrop-filter: blur(5px);
justify-content:center;
align-items:center;
}

/* CONTENIDO */
.modal-content{
position:relative;
background:linear-gradient(145deg,#1e293b,#0f172a);
padding:25px;
border-radius:16px;
width:320px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
animation:fadeIn .3s ease;
}

/* ANIMACION */
@keyframes fadeIn{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

/* BOTON CERRAR */
.close{
position:absolute;
top:10px;
right:12px;
font-size:18px;
cursor:pointer;
color:#94a3b8;
}
.close:hover{color:white;}

/* INPUTS PRO */
.modal-content input{
width:100%;
margin-bottom:12px;
padding:12px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:white;
outline:none;
transition:.2s;
}

.modal-content input:focus{
border-color:var(--accent);
box-shadow:0 0 10px rgba(37,99,235,0.5);
}

/* BOTON GUARDAR PRO */
.modal-content button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,var(--accent),var(--accent-light));
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.modal-content button:hover{
transform:scale(1.03);
box-shadow:0 10px 20px rgba(37,99,235,0.4);
}

@media(max-width:768px){.sidebar{display:none;}}
</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<div class="author">by: Luis Carranza</div>

<div class="menu">
<div class="menu-item" onclick="cargar()">🏠 Inicio</div>
</div>
</div>

<div class="main">
<h2 class="title">Mis enlaces</h2>

<div class="topbar">
<input id="search" placeholder="Buscar...">
<select id="filter"><option value="">Todas</option></select>
</div>

<div class="grid" id="links"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal" id="modal" onclick="cerrarModal(event)">
<div class="modal-content" onclick="event.stopPropagation()">

<div class="close" onclick="closeModal()">✖</div>

<input id="titulo" placeholder="Título">
<input id="url" placeholder="URL">
<input id="categoria" placeholder="Categoría">

<button onclick="guardar()">Guardar</button>

</div>
</div>

<script>
window.addEventListener("DOMContentLoaded",()=>{

const supabaseClient = supabase.createClient(
"https://fburktlykhajzzvpnfcg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidXJrdGx5a2hhanp6dnBuZmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDg3NDEsImV4cCI6MjA5MjYyNDc0MX0.J1O0IjfC233ezx9jb55xnINm4i9qtX6obnFvCvoyDk4"
);

let data=[];
let editId=null;

function getFavicon(url){
return "https://www.google.com/s2/favicons?sz=64&domain="+url;
}

async function cargar(){
const {data:links}=await supabaseClient.from('links').select('*');
data=links||[];
render();
categorias();
}

function render(){
const cont=document.getElementById("links");
cont.innerHTML="";

data.forEach(i=>{
let url=i.url.startsWith("http")?i.url:"https://"+i.url;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="more">⋮</div>
<div class="dropdown">
<div onclick="editar(${i.id})">✏️ Editar</div>
<div onclick="eliminar(${i.id})">🗑 Eliminar</div>
</div>
<img src="${getFavicon(url)}">
<div>${i.titulo}</div>
<div class="tag">${i.categoria}</div>
`;

div.onclick=()=>window.open(url,"_blank");

const more=div.querySelector(".more");
const dropdown=div.querySelector(".dropdown");

more.onclick=(e)=>{
e.stopPropagation();
dropdown.style.display=dropdown.style.display==="flex"?"none":"flex";
};

cont.appendChild(div);
});
}

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function cerrarModal(e){
if(e.target.id==="modal") closeModal();
}

async function eliminar(id){
if(!confirm("¿Eliminar enlace?"))return;
await supabaseClient.from('links').delete().eq('id',id);
cargar();
}

function editar(id){
const item=data.find(x=>x.id===id);
document.getElementById("titulo").value=item.titulo;
document.getElementById("url").value=item.url;
document.getElementById("categoria").value=item.categoria;
editId=id;
openModal();
}

async function guardar(){
const titulo=document.getElementById("titulo").value.trim();
const url=document.getElementById("url").value.trim();
const categoria=document.getElementById("categoria").value.trim();

if(!titulo||!url||!categoria){alert("Completa todo");return;}

if(editId){
await supabaseClient.from('links').update({titulo,url,categoria}).eq('id',editId);
editId=null;
}else{
await supabaseClient.from('links').insert([{titulo,url,categoria}]);
}

closeModal();

document.getElementById("titulo").value="";
document.getElementById("url").value="";
document.getElementById("categoria").value="";

cargar();
}

function categorias(){
const select=document.getElementById("filter");
const cats=[...new Set(data.map(i=>i.categoria))];
select.innerHTML='<option value="">Todas</option>';
cats.forEach(c=>select.innerHTML+=`<option>${c}</option>`);
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);

window.openModal=openModal;
window.closeModal=closeModal;
window.cargar=cargar;
window.editar=editar;
window.eliminar=eliminar;
window.guardar=guardar;

cargar();

});
</script>

</body>
</html>
