<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Luis</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--c1:#4424d3;
--c2:#6943de;
--c3:#8f62e9;
--c4:#b481f4;
--c5:#daa0ff;
--glass:rgba(255,255,255,0.07);
--border:rgba(255,255,255,0.15);
--text:#e2e8f0;
}

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#020617,#0f172a);
color:var(--text);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
padding:20px;
background:rgba(50,20,120,0.4);
backdrop-filter:blur(15px);
}

.sidebar h2{
background:linear-gradient(90deg,var(--c3),var(--c5));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin:0;
}

.author{color:white;font-weight:bold;font-size:13px;}

.menu-item{margin-top:20px;cursor:pointer}

/* MAIN */
.main{flex:1;padding:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

/* CARD */
.card{
background:var(--glass);
border:1px solid var(--border);
padding:15px;
border-radius:15px;
cursor:pointer;
position:relative;
}

.card:hover{
transform:translateY(-5px);
}

.tag{
background:linear-gradient(135deg,var(--c3),var(--c5));
padding:4px 8px;
border-radius:5px;
font-size:12px;
}

/* MENU */
.more{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
top:30px;
right:10px;
background:#111;
border-radius:8px;
}

.dropdown div{
padding:8px;
cursor:pointer;
}

.dropdown div:hover{background:var(--c2);}

/* BOTON */
.add-btn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,var(--c2),var(--c5));
color:white;
font-size:30px;
border:none;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.modal-box{
background:rgba(40,20,100,0.9);
padding:20px;
border-radius:15px;
width:300px;
position:relative;
}

.close{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
}

.modal-box input{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:8px;
border:none;
background:#020617;
color:white;
}

.modal-box button{
width:100%;
padding:10px;
background:linear-gradient(135deg,var(--c2),var(--c5));
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<div class="author">by: Luis Carranza</div>
<div class="menu-item" onclick="loadData()">🏠 Inicio</div>
</div>

<div class="main">
<h2>Mis enlaces</h2>

<input id="search" placeholder="Buscar..." oninput="render()">

<div class="grid" id="links"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div class="modal" id="modal" onclick="outside(event)">
<div class="modal-box" onclick="event.stopPropagation()">
<div class="close" onclick="closeModal()">✖</div>

<input id="titulo" placeholder="Título">
<input id="url" placeholder="URL">
<input id="categoria" placeholder="Categoría">

<button onclick="save()">Guardar</button>

</div>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://fburktlykhajzzvpnfcg.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidXJrdGx5a2hhanp6dnBuZmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDg3NDEsImV4cCI6MjA5MjYyNDc0MX0.J1O0IjfC233ezx9jb55xnINm4i9qtX6obnFvCvoyDk4"
);

let data=[];
let editId=null;

async function loadData(){
const {data:links,error}=await supabaseClient.from('links').select('*');
if(error){console.log(error);return;}
data=links||[];
render();
}

function render(){
const cont=document.getElementById("links");
cont.innerHTML="";

const search=document.getElementById("search").value.toLowerCase();

data.filter(i=>i.titulo.toLowerCase().includes(search))
.forEach(i=>{

let url=i.url.startsWith("http")?i.url:"https://"+i.url;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="more">⋮</div>
<div class="dropdown">
<div onclick="edit(${i.id})">Editar</div>
<div onclick="del(${i.id})">Eliminar</div>
</div>
<div>${i.titulo}</div>
<div class="tag">${i.categoria}</div>
`;

div.onclick=()=>window.open(url,"_blank");

const more=div.querySelector(".more");
const drop=div.querySelector(".dropdown");

more.onclick=(e)=>{
e.stopPropagation();
drop.style.display=drop.style.display==="block"?"none":"block";
};

cont.appendChild(div);

});
}

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function outside(e){
if(e.target.id==="modal") closeModal();
}

async function save(){
const titulo=document.getElementById("titulo").value.trim();
const url=document.getElementById("url").value.trim();
const categoria=document.getElementById("categoria").value.trim();

if(!titulo||!url||!categoria){
alert("Completa todos los campos");
return;
}

if(editId){
await supabaseClient.from('links').update({titulo,url,categoria}).eq('id',editId);
editId=null;
}else{
await supabaseClient.from('links').insert([{titulo,url,categoria}]);
}

closeModal();

document.getElementById("titulo").value="";
document.getElementById("url").value="";
document.getElementById("categoria").value="";

loadData();
}

function edit(id){
const item=data.find(x=>x.id===id);
document.getElementById("titulo").value=item.titulo;
document.getElementById("url").value=item.url;
document.getElementById("categoria").value=item.categoria;
editId=id;
openModal();
}

async function del(id){
if(!confirm("¿Eliminar?"))return;
await supabaseClient.from('links').delete().eq('id',id);
loadData();
}

loadData();
</script>

</body>
</html>
